<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="鲲鸿祥瑞产品展示 - 内部详情页" />
  <title>内部详情 - 鲲鸿祥瑞产品展示</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <a href="index.html" class="logo-link">
      <img src="images/logo.svg" alt="鲲鸿祥瑞" class="logo-img" />
    </a>
    <h1 class="site-title">鲲鸿祥瑞产品展示 · 内部详情</h1>
  </header>

  <!-- Login -->
  <div class="login-container" id="loginContainer">
    <div class="login-card">
      <h2>内部详情登录</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required />
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required />
        </div>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" class="btn btn-primary">登 录</button>
      </form>
    </div>
  </div>

  <!-- Main Content (hidden until login) -->
  <div id="mainContent" style="display:none;">

    <!-- Nav -->
    <nav class="nav-bar" id="navBar">
      <button class="btn btn-sm btn-danger" id="logoutBtn" style="margin-left:auto;">退出登录</button>
    </nav>

    <!-- Product Table -->
    <div class="product-table-container">
      <table class="product-table">
        <thead>
          <tr>
            <th>产品方向</th>
            <th>海报名称</th>
            <th>天数</th>
            <th>收客细则</th>
            <th>海报预览</th>
            <th>行程下载</th>
            <th>上传时间</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="no-data" id="noData" style="display:none;">暂无产品数据</div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span class="divider">——</span> 底线在此 <span class="divider">——</span>
    <br />
    <small>最后更新：2026/6/16 14:02</small>
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>
